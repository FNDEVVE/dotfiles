    vision:
      - anthropic/claude-opus-4-8:xhigh
      - openai-codex/gpt-5.5:medium
      - devin/kimi-k2-7
browser:
  headless: true
async:
  enabled: true
bash:
  autoBackground:
    enabled: true
lsp:
  diagnosticsOnEdit: true
bashInterceptor:
  enabled: true
inspect_image:
  enabled: true
checkpoint:
  enabled: true
tier:
  openai: priority
  anthropic: none
  subagent: default
  advisor: default
tools:
  format: auto
advisor:
  enabled: true
  subagents: true
terminal:
  showProgress: true
display:
  shimmer: kitt
  showTokenUsage: true
  cacheMissMarker: true
dev:
  autoqa:
    consent: granted
snapcompact:
  toolResults: false
tui:
  renderMermaid: false
  tight: true
  hyperlinks: always
compaction:
  handoffSaveToDisk: true
  strategy: snapcompact
mnemopi:
  enhancedRecall: true
  polyphonicRecall: true
  proactiveLinking: true
  scoping: global
readLineNumbers: true
read:
  toolResultPreview: true
github:
  enabled: true
speechgen:
  enabled: true
speech:
  enabled: true
  enhanced: true
exa:
  enableResearcher: true
personality: pragmatic
autocompleteMaxVisible: 10
