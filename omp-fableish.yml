  - skill:chronicle
  - slash-command:glm-plan-usage:usage-query
  - context-file:user:CLAUDE.md
  - skill:ponytail
  - skill:ponytail-audit
  - skill:ponytail-debt
  - skill:ponytail-gain
  - skill:ponytail-help
  - rule:go-add-cleanup
  - rule:go-bench-loop
  - rule:go-exp-promoted
  - rule:go-ioutil
