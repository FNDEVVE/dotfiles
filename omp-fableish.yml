providers:
  webSearch: exa
  memoryModel: online
  tts: local
  image: openai
  fetch: jina
setupVersion: 1
statusLine:
  preset: nerd
  separator: powerline
  sessionAccent: true
  transparent: false
  compactThinkingLevel: false
defaultThinkingLevel: high
memory:
  backend: mnemopi
autolearn:
  enabled: true
  autoContinue: true
edit:
  mode: hashline
task:
  eager: always
  enableLsp: true
  maxConcurrency: 32
  isolation:
    merge: patch
    commits: ai
    mode: rcopy
  maxRecursionDepth: -1
  disabledAgents:
    - usage-query-agent
  agentModelOverrides:
    explore: devin/gemini-3-5-flash
    librarian: devin/gemini-3-5-flash
    sonic: openai-codex/gpt-5.5:low
    designer: devin/claude-5-fable-medium
