commands:
  enableOpencodeUser: false
  enableOpencodeProject: false
  enableClaudeUser: false
  enableClaudeProject: false
disabledExtensions:
  - extension-module:orca-agent-status
  - extension-module:orca-prefill
  - extension-module:orca-titlebar-spinner
